version: '3.8'

services:
  # LocalStack - AWS Cloud Emulator
  localstack:
    container_name: cloudtwin-localstack
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=s3,ec2,iam,rds,cloudtrail
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - "./digital-twin/localstack_config:/etc/localstack/init"
      - "./digital-twin/terraform_templates:/terraform"
    networks:
      - cloudtwin-network

  # FastAPI Backend
  backend:
    container_name: cloudtwin-backend
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - localstack
    environment:
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - ./blockchain-audit:/app/blockchain-audit
      - ./ai-engine:/app/ai-engine
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - cloudtwin-network

  # Frontend (placeholder for React app)
  # Uncomment when React app is ready
  # frontend:
  #   container_name: cloudtwin-frontend
  #   build: ./frontend
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend:/app
  #   networks:
  #     - cloudtwin-network

networks:
  cloudtwin-network:
    driver: bridge

# Usage:
# docker-compose up -d        # Start all services
# docker-compose down          # Stop all services
# docker-compose logs -f       # View logs