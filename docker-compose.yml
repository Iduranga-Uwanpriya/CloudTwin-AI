version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    container_name: cloudtwin-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=cloudtwin
      - POSTGRES_PASSWORD=cloudtwin_secret
      - POSTGRES_DB=cloudtwin_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cloudtwin-network

  # LocalStack - AWS Cloud Emulator
  localstack:
    container_name: cloudtwin-localstack
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=s3,ec2,iam,rds,cloudtrail
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - "./digital-twin/localstack_config:/etc/localstack/init"
      - "./digital-twin/terraform_templates:/terraform"
    networks:
      - cloudtwin-network

  # FastAPI Backend
  backend:
    container_name: cloudtwin-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - localstack
      - postgres
    environment:
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - DATABASE_URL=postgresql://cloudtwin:cloudtwin_secret@postgres:5432/cloudtwin_db
      - JWT_SECRET=cloudtwin-jwt-secret-change-in-production
      - PYTHONPATH=/app
      # Real AWS credentials for cross-account scanning (STS AssumeRole)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ./backend:/app/backend
      - ./blockchain_audit:/app/blockchain_audit
      - ./ai_engine:/app/ai_engine
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - cloudtwin-network

  # React Frontend
  frontend:
    container_name: cloudtwin-frontend
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://cloudtwin-backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - cloudtwin-network

volumes:
  pgdata:

networks:
  cloudtwin-network:
    driver: bridge

# Usage:
# docker-compose up -d        # Start all services
# docker-compose down          # Stop all services
# docker-compose logs -f       # View logs